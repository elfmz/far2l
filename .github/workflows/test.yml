name: Automated Testing

on:
  # Run on push to master
  push:
    branches: [master]
  # Run on pull requests
  pull_request:
    branches: [master]
  # Allow manual triggering
  workflow_dispatch:

env:
  BUILD_TYPE: Debug

jobs:
  unit-tests-linux:
    name: Unit Tests (Linux)
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout source
      uses: actions/checkout@v4
      
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          libwxgtk3.2-dev \
          libx11-dev \
          libxi-dev \
          libssl-dev \
          libsmbclient-dev \
          libnfs-dev \
          libneon27-dev \
          libssh-dev \
          libarchive-dev \
          python3-dev \
          python3-cffi
          
    - name: Create Build Environment
      run: mkdir -p _build
      
    - name: Configure CMake
      run: |
        cmake -S . -B _build -Wno-dev \
          -DCMAKE_BUILD_TYPE=$BUILD_TYPE \
          -DTESTING=YES \
          -DUSEUCD=NO \
          -DPYTHON=yes
          
    - name: Build
      run: cmake --build _build --config $BUILD_TYPE -j$(nproc --all)
      
    - name: Run Unit Tests
      run: |
        cd _build
        ./testing/unit/far2l_unit_tests
        
    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: unit-test-results
        path: |
          _build/testing/unit/*.xml
          _build/Testing/**/*.xml

  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout source
      uses: actions/checkout@v4
      
    - name: Install Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'
        
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          libwxgtk3.2-dev \
          libx11-dev \
          libxi-dev \
          libssl-dev \
          libsmbclient-dev \
          libnfs-dev \
          libneon27-dev \
          libssh-dev \
          libarchive-dev \
          python3-dev \
          python3-cffi \
          xvfb
          
    - name: Create Build Environment
      run: mkdir -p _build
      
    - name: Configure CMake
      run: |
        cmake -S . -B _build -Wno-dev \
          -DCMAKE_BUILD_TYPE=$BUILD_TYPE \
          -DTESTING=YES \
          -DUSEUCD=NO \
          -DPYTHON=yes
          
    - name: Build
      run: cmake --build _build --config $BUILD_TYPE -j$(nproc --all)
      
    - name: Run Smoke Tests
      run: |
        if [ -f "_build/install/far2l" ]; then
          FAR2L_BIN="../_build/install/far2l"
        elif [ -f "_build/far2l/far2l" ]; then
          FAR2L_BIN="../_build/far2l/far2l"
        else
          echo "far2l binary not found"; exit 1
        fi
        cd testing
        xvfb-run ./far2l-smoke-run.sh --all "$FAR2L_BIN"
        
    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: smoke-test-results
        path: testing/tests/**/*.log

  cross-platform:
    name: Cross-Platform Build Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        
    steps:
    - name: Checkout source
      uses: actions/checkout@v4
      
    - name: Install dependencies (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          libwxgtk3.2-dev \
          libx11-dev \
          libxi-dev \
          libssl-dev \
          libsmbclient-dev \
          libnfs-dev \
          libneon27-dev \
          libssh-dev \
          libarchive-dev \
          python3-dev \
          python3-cffi
          
    - name: Install dependencies (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        brew update
        brew install cmake wxwidgets libarchive openssl
        brew link libarchive --force
        
    - name: Create Build Environment
      run: mkdir -p _build
      
    - name: Configure CMake
      run: |
        cmake -S . -B _build -Wno-dev \
          -DCMAKE_BUILD_TYPE=$BUILD_TYPE \
          -DTESTING=YES \
          -DUSEUCD=NO
          
    - name: Build
      run: |
        if [ "$RUNNER_OS" = "Linux" ]; then
          cmake --build _build --config $BUILD_TYPE -j$(nproc --all)
        else
          cmake --build _build --config $BUILD_TYPE -j$(sysctl -n hw.logicalcpu)
        fi
        
    - name: Verify Build
      run: |
        if [ -f "_build/install/far2l" ] || \
           [ -f "_build/install/far2l.app/Contents/MacOS/far2l" ] || \
           [ -f "_build/install/far2l.exe" ]; then
          echo "Build successful"
        else
          echo "Build failed - executable not found"
          find _build -name far2l -type f 2>/dev/null | head -5
          exit 1
        fi